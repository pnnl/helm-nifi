name: Release Helm Chart
on:
  push:
    branches:
      fix-actions-and-file-tree
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'
          
      - name: Helm lint
        run: helm lint .
      
      - name: Extract chart version from tag
        id: version
        run: |
          # VERSION=${GITHUB_REF#refs/tags/v}
          # if [[ $(helm version --short) != $(echo $VERSION | sed s/v//g) ]]; then 
          #   echo "Error: release name mismatch!"
          #   exit 1
          # fi

          # docker manifest inspect ghcr.io/${{ github.repository }}:$VERSION > /dev/null 2>&1
          # if [ $? -eq 0 ]; then
          #   echo "Error: version already exists in registry"
          #   exit 1
          # fi
          
          echo "VERSION=$(helm version --short)" >> $GITHUB_OUTPUT
          echo "DRYRUN"
        shell: bash
      
      - name: Package Helm chart
        run: |
          helm dependency update
          helm package . --version ${{ steps.version.outputs.VERSION }} --destination .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nifi-chart
          path: ./nifi-${{ steps.version.outputs.VERSION }}.tgz
  
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: nifi-chart
          path: .chart
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
                    
      - name: Push charts to GHCR
        run: |
          for pkg in .chart/*.tgz; do
            if [ -f "$pkg" ]; then
              echo "Pushing ${pkg} to OCI registry"
              # helm push "${pkg}" "oci://ghcr.io/${{ github.repository_owner }}/charts"
              echo "DRYRUN"
            fi
          done